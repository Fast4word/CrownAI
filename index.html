<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunah AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #581c87 100%);
            display: flex;
            overflow: hidden;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .code-panel {
            width: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(139, 92, 246, 0.3);
            overflow: hidden;
            transition: width 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .code-panel.active {
            width: 500px;
        }

        .code-header {
            background: rgba(0, 0, 0, 0.5);
            padding: 1rem;
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .code-header h3 {
            color: white;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .code-actions {
            display: flex;
            gap: 0.5rem;
        }

        .code-btn {
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.4);
            color: #c4b5fd;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .code-btn:hover {
            background: rgba(139, 92, 246, 0.3);
        }

        .code-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .code-block {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .code-block-header {
            background: rgba(139, 92, 246, 0.1);
            padding: 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
        }

        .code-lang {
            color: #c4b5fd;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid rgba(139, 92, 246, 0.4);
            color: #c4b5fd;
            padding: 0.25rem 0.75rem;
            border-radius: 0.25rem;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: rgba(139, 92, 246, 0.2);
        }

        .code-block pre {
            margin: 0;
            padding: 1rem;
            color: #e0e7ff;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            line-height: 1.5;
            overflow-x: auto;
            white-space: pre;
        }

        .header {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
            padding: 1rem;
        }

        .header-content {
            max-width: 1024px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .bot-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.5);
        }

        .header-text h1 {
            color: white;
            font-size: 1.25rem;
            font-weight: bold;
        }

        .header-text p {
            color: #c4b5fd;
            font-size: 0.875rem;
        }

        .settings-btn {
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.4);
            color: #c4b5fd;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .settings-btn:hover {
            background: rgba(139, 92, 246, 0.3);
        }

        .settings-panel {
            display: none;
            background: rgba(251, 191, 36, 0.1);
            border-bottom: 1px solid rgba(251, 191, 36, 0.3);
            padding: 1rem;
        }

        .settings-panel.active {
            display: block;
        }

        .settings-content {
            max-width: 1024px;
            margin: 0 auto;
        }

        .settings-content h3 {
            color: #fbbf24;
            margin-bottom: 0.5rem;
        }

        .settings-content p {
            color: #fde68a;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .settings-content a {
            color: #fbbf24;
            text-decoration: underline;
        }

        .api-input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .api-input-group input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(251, 191, 36, 0.3);
            color: white;
            padding: 0.75rem;
            border-radius: 0.5rem;
            outline: none;
        }

        .api-input-group button {
            background: #f59e0b;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
        }

        .api-input-group button:hover {
            background: #d97706;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .messages {
            max-width: 1024px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 0.75rem;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: white;
            font-size: 20px;
        }

        .message.user .message-icon {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }

        .message.assistant .message-icon {
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
        }

        .message-content {
            max-width: 700px;
            padding: 1rem 1.25rem;
            border-radius: 1.25rem;
            word-wrap: break-word;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
        }

        .message.assistant .message-content {
            background: rgba(139, 92, 246, 0.15);
            backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .typing {
            display: inline-flex;
            gap: 4px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .input-container {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(139, 92, 246, 0.3);
            padding: 1rem;
        }

        .input-wrapper {
            max-width: 1024px;
            margin: 0 auto;
            display: flex;
            gap: 0.5rem;
        }

        #messageInput {
            flex: 1;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 9999px;
            padding: 0.875rem 1.5rem;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        #messageInput::placeholder {
            color: #9ca3af;
        }

        #messageInput:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        #sendButton {
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #sendButton:hover:not(:disabled) {
            transform: scale(1.05);
        }

        #sendButton:disabled {
            background: #4b5563;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <div class="header-content">
                <div class="header-left">
                    <div class="bot-icon">⚡</div>
                    <div class="header-text">
                        <h1>AI Chatbot</h1>
                        <p>Powered by Groq - Ready to Chat!</p>
                    </div>
                </div>
                <button class="settings-btn" onclick="openCodePanel()">💻 Open Code Snippets</button>
            </div>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="messages" id="messages">
                <div class="message assistant">
                    <div class="message-icon">⚡</div>
                    <div class="message-content">Hello! I'm powered by Groq's lightning-fast AI and I'm ready to chat! Ask me anything or request code and it will appear in a popup panel on the right!</div>
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Type your message..."
                    autocomplete="off"
                >
                <button id="sendButton">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div class="code-panel" id="codePanel">
        <div class="code-header">
            <h3>💻 Code Snippets</h3>
            <div class="code-actions">
                <button class="code-btn" onclick="clearCode()">Clear All</button>
                <button class="code-btn" onclick="closeCodePanel()">✕ Close</button>
            </div>
        </div>
        <div class="code-content" id="codeContent">
            <p style="color: #9ca3af; text-align: center; padding: 2rem;">No code snippets yet. Ask me to write some code!</p>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById('messagesContainer');
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const codePanel = document.getElementById('codePanel');
        const codeContent = document.getElementById('codeContent');

        let isLoading = false;
        let apiKey = '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'; // Replace with your actual Groq API key
        let conversationHistory = [];
        let codeSnippets = [];

        // Load saved data on startup
        function loadSavedData() {
            const savedConversation = sessionStorage.getItem('conversation');
            const savedCode = sessionStorage.getItem('codeSnippets');
            
            if (savedConversation) {
                conversationHistory = JSON.parse(savedConversation);
                const messages = conversationHistory.filter(m => m.role !== 'system');
                messages.forEach(msg => {
                    if (msg.displayText !== false) {
                        addMessageToUI(msg.role, msg.content);
                    }
                });
            }
            
            if (savedCode) {
                codeSnippets = JSON.parse(savedCode);
                if (codeSnippets.length > 0) {
                    codeContent.innerHTML = '';
                    codeSnippets.forEach(snippet => {
                        addCodeToPanel(snippet.language, snippet.code, false);
                    });
                }
            }
        }

        function saveData() {
            sessionStorage.setItem('conversation', JSON.stringify(conversationHistory));
            sessionStorage.setItem('codeSnippets', JSON.stringify(codeSnippets));
        }

        function extractCodeBlocks(text) {
            const codeBlockRegex = /```(\w+)?\n([\s\S]*?)```/g;
            const blocks = [];
            let match;
            
            while ((match = codeBlockRegex.exec(text)) !== null) {
                blocks.push({
                    language: match[1] || 'code',
                    code: match[2].trim()
                });
            }
            
            return blocks;
        }

        function addCodeToPanel(language, code, shouldSave = true) {
            if (codeSnippets.length === 0) {
                codeContent.innerHTML = '';
            }
            
            if (shouldSave) {
                codeSnippets.push({ language, code });
                saveData();
            }
            
            const codeBlock = document.createElement('div');
            codeBlock.className = 'code-block';
            
            const header = document.createElement('div');
            header.className = 'code-block-header';
            
            const lang = document.createElement('span');
            lang.className = 'code-lang';
            lang.textContent = language.toUpperCase();
            
            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.textContent = 'Copy';
            copyBtn.onclick = function() {
                navigator.clipboard.writeText(code);
                copyBtn.textContent = '✓ Copied!';
                setTimeout(() => copyBtn.textContent = 'Copy', 2000);
            };
            
            header.appendChild(lang);
            header.appendChild(copyBtn);
            
            const pre = document.createElement('pre');
            pre.textContent = code;
            
            codeBlock.appendChild(header);
            codeBlock.appendChild(pre);
            codeContent.appendChild(codeBlock);
            
            codePanel.classList.add('active');
        }

        function closeCodePanel() {
            codePanel.classList.remove('active');
        }

        function openCodePanel() {
            codePanel.classList.add('active');
        }

        function clearCode() {
            codeSnippets = [];
            codeContent.innerHTML = '<p style="color: #9ca3af; text-align: center; padding: 2rem;">No code snippets yet. Ask me to write some code!</p>';
            saveData();
        }

        function addMessage(role, content) {
            addMessageToUI(role, content);
            saveData();
        }

        function addMessageToUI(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + role;
            
            const icon = document.createElement('div');
            icon.className = 'message-icon';
            icon.textContent = role === 'user' ? '👤' : '⚡';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;
            
            messageDiv.appendChild(icon);
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            
            const icon = document.createElement('div');
            icon.className = 'message-icon';
            icon.textContent = '⚡';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.innerHTML = '<span></span><span></span><span></span>';
            
            contentDiv.appendChild(typing);
            typingDiv.appendChild(icon);
            typingDiv.appendChild(contentDiv);
            messagesDiv.appendChild(typingDiv);
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function hideTyping() {
            const typingDiv = document.getElementById('typingIndicator');
            if (typingDiv) typingDiv.remove();
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            
            if (!message || isLoading) return;

            if (!apiKey || apiKey === 'YOUR_GROQ_API_KEY_HERE') {
                alert('Please replace YOUR_GROQ_API_KEY_HERE in the code with your actual Groq API key!');
                return;
            }

            addMessage('user', message);
            conversationHistory.push({
                role: 'user',
                content: message
            });
            
            messageInput.value = '';
            isLoading = true;
            sendButton.disabled = true;
            showTyping();

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + apiKey,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: conversationHistory,
                        temperature: 0.7,
                        max_tokens: 2048
                    })
                });

                hideTyping();

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || 'API request failed');
                }

                const data = await response.json();
                const assistantMessage = data.choices[0].message.content;
                
                conversationHistory.push({
                    role: 'assistant',
                    content: assistantMessage
                });
                
                const codeBlocks = extractCodeBlocks(assistantMessage);
                if (codeBlocks.length > 0) {
                    codeBlocks.forEach(block => {
                        addCodeToPanel(block.language, block.code);
                    });
                }
                
                addMessage('assistant', assistantMessage);

            } catch (error) {
                hideTyping();
                console.error('Error:', error);
                addMessage('assistant', 'Error: ' + error.message + '\n\nPlease check your API key and try again.');
            } finally {
                isLoading = false;
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        sendButton.addEventListener('click', sendMessage);
        
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Load saved data when page loads
        loadSavedData();
        messageInput.focus();
    </script>
</body>
</html>
